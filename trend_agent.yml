name: Trend Agent

on:
  schedule:
    # Daily at 07:00 Amsterdam time (06:00 UTC in winter, 05:00 UTC in summer)
    # Adjust cron if you want weekly instead: "0 5 * * 1"  = every Monday 07:00 CEST
    - cron: "0 5 * * *"      # Daily
    # - cron: "0 5 * * 1"   # Weekly (Monday) — uncomment and comment out daily line

  workflow_dispatch:          # Manual trigger from GitHub UI

jobs:
  run-trend-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytrends

      - name: Run trend agent
        env:
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          GEO:             ${{ secrets.GEO }}             # e.g. US or NL
          CATEGORY:        ${{ secrets.CATEGORY }}        # 0 or 18 (shopping)
          TOP_N:           ${{ secrets.TOP_N }}           # e.g. 10
          TIMEFRAME:       ${{ secrets.TIMEFRAME }}       # now 7-d or now 1-d
        run: python trend_agent.py
